# About tab descriptions
label.miisDescription=Each (virtual) amiibo has a mii associated with it, like with normal amiibos.\n\nemuiigen can't generate a random mii here, but for virtual amiibos\nwhich lack a mii (those generated here) emuiibo will automatically generate\na random mii for them on boot.\n\nemuiibo also exports mii files (charinfo bins) for console miis, so that those can\nbe copied inside an amiibo to use that mii with them.
label.randomUuidDescription=A virtual amiibo is generated along with a unique, random UUID, which will be used by emuiibo by default.\n\nIf UUID randomization is enabled in a virtual amiibo, emuiibo will ignore this UUID and use random ones.\nThis feature can be used to bypass certain game checks that limit amiibos to one reward per day.\n\nNote that you can disable this anytime by editing the virtual amiibo, here or in the emuiibo overlay.
label.applicationAreasDescription=An application area is per-game amiibo savedata. Real amiibos only can save data from one game,\nwhile emuiibo's virtual amiibos do not have this restriction.\n\nIf you open an amiibo on the menu above, you will be able to check all the areas the amiibo has, along\nwith their corresponding game's application ID.

