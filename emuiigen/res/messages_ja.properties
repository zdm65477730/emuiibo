# About tab descriptions
label.miisDescription=各（仮想）amiiboには通常のamiiboのようにmiiが関連付けられています。\n\nemuiigenはここでランダムなmiiを生成することはできませんが、\nmiiを持たない仮想amiibo（ここで生成されたもの）については、\nemuiiboが起動時に自動的にランダムなmiiを生成します。\n\nemuiiboはコンソールのmii用のmiiファイル（charinfo bins）もエクスポートするので、\nそれらをamiibo内にコピーしてそのmiiを使用できます。
label.randomUuidDescription=仮想amiiboは、emuiiboでデフォルトで使用される一意のランダムUUIDとともに生成されます。\n\n仮想amiiboでUUIDランダム化が有効になっている場合、\nemuiiboはこのUUIDを無視してランダムなUUIDを使用します。\nこの機能は、amiiboの報酬を1日1回に制限する特定のゲームチェックを回避するために使用できます。\n\nこの仮想amiiboは、ここまたはemuiiboオーバーレイで編集することでいつでも無効にできることに注意してください。
label.applicationAreasDescription=アプリケーション領域はゲームごとのamiiboセーブデータです。\n実際のamiiboは1つのゲームからのデータのみを保存できますが、\nemuiiboの仮想amiiboにはこの制限はありません。\n\n上記のメニューでamiiboを開くと、そのamiiboが持つすべての領域と、\nそれに対応するゲームのアプリケーションIDを確認できます。

