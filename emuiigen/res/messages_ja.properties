# Miis tab content
miis.content=各（仮想）amiiboには通常のamiiboのようにmiiが関連付けられています。\n\n\
emuiigenはここでランダムなmiiを生成できませんが、miiがない仮想amiibo\n\
（ここで生成されたもの）については、emuiiboが起動時に自動的に\n\
ランダムなmiiを生成します。\n\n\
emuiiboはコンソールのmiiファイル（charinfo bins）もエクスポートするので、\n\
それらをamiibo内にコピーしてそのmiiを使用できます。

# Random UUID tab content
randomUuid.content=仮想amiiboは、emuiiboでデフォルトで使用される一意のランダムUUIDとともに生成されます。\n\n\
仮想amiiboでUUIDランダム化が有効になっている場合、emuiiboはこのUUIDを無視してランダムなものを使用します。\n\
この機能は、amiiboを1日に1回の報酬に制限する特定のゲームチェックを回避するために使用できます。\n\n\
ここまたはemuiiboオーバーレイで仮想amiiboを編集することで、いつでもこれを無効にできることに注意してください。

# Application areas tab content
applicationAreas.content=アプリケーション領域はゲームごとのamiiboセーブデータです。実際のamiiboは1つのゲームからのみデータを保存できますが、\n\
emuiiboの仮想amiiboにはこの制限はありません。\n\n\
上記のメニューでamiiboを開くと、amiiboが持っているすべての領域と、\n\
それに対応するゲームのアプリケーションIDを確認できます。
