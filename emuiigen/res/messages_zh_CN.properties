# About tab descriptions
label.miisDescription=每个（虚拟）amiibo都关联了一个mii，就像普通amiibo一样。\n\nemuiigen无法在此处生成随机mii，但对于缺少mii的虚拟amiibo（在此处生成的那些），\nemuiibo将在启动时自动为其生成一个随机mii。\n\nemuiibo还为控制台mii导出mii文件（charinfo bins），\n以便可以将这些mii复制到amiibo内部以与其一起使用。
label.randomUuidDescription=虚拟amiibo会随同唯一的随机UUID一起生成，默认情况下emuiibo将使用该UUID。\n\n如果在虚拟amiibo中启用了UUID随机化，emuiibo将忽略此UUID并使用随机UUID。\n此功能可用于绕过某些游戏限制，这些游戏限制每个amiibo每天只能获得一次奖励。\n\n请注意，您可以随时通过在此处或emuiibo覆盖层中编辑虚拟amiibo来禁用此功能。
label.applicationAreasDescription=应用程序区域是每个游戏的amiibo存档数据。\n真实amiibo只能保存来自一个游戏的数据，而emuiibo的虚拟amiibo没有此限制。\n\n如果您在上面的菜单中打开一个amiibo，您将能够检查该amiibo拥有的所有区域，\n以及它们对应的游戏应用程序ID。

