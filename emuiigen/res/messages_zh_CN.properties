# Miis tab content
miis.content=每个（虚拟）amiibo都有一个与之关联的mii，就像普通amiibo一样。\n\n\
emuiigen无法在此处生成随机mii，但对于缺少mii的虚拟amiibo\n\
（在此处生成的那些），emuiibo将在启动时自动生成\n\
一个随机mii。\n\n\
emuiibo还导出控制台mii文件(charinfo bins)，以便可以将这些mii\n\
复制到amiibo内部以在其中使用该mii。

# Random UUID tab content
randomUuid.content=虚拟amiibo会生成一个唯一且随机的UUID，默认情况下emuiibo将使用它。\n\n\
如果在虚拟amiibo中启用了UUID随机化，emuiibo将忽略此UUID并使用随机的UUID。\n\
此功能可用于绕过某些游戏限制，这些限制将amiibo限制为每天一个奖励。\n\n\
请注意，您可以随时通过在此处或emuiibo覆盖菜单中编辑虚拟amiibo来禁用此功能。

# Application areas tab content
applicationAreas.content=应用程序区域是每个游戏的amiibo存档数据。真实的amiibo只能保存一个游戏的数据，\n\
而emuiibo的虚拟amiibo没有此限制。\n\n\
如果您在上面的菜单中打开一个amiibo，您将能够检查amiibo拥有的所有区域，\n\
以及相应游戏的应用程序ID。

