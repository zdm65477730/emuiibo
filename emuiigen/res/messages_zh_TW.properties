# About tab descriptions
label.miisDescription=每個（虛擬）amiibo都關聯了一個mii，就像普通amiibo一樣。\n\nemuiigen無法在此處產生隨機mii，但對於缺少mii的虛擬amiibo（在此處產生的那些），\nemuiibo將在啟動時自動為其產生一個隨機mii。\n\nemuiibo還為控制台mii匯出mii檔案（charinfo bins），\n以便可以將這些mii複製到amiibo內部以與其一起使用。
label.randomUuidDescription=虛擬amiibo會隨同唯一的隨機UUID一起產生，預設情況下emuiibo將使用該UUID。\n\n如果在虛擬amiibo中啟用了UUID隨機化，emuiibo將忽略此UUID並使用隨機UUID。\n此功能可用於繞過某些遊戲限制，這些遊戲限制每個amiibo每天只能獲得一次獎勵。\n\n請注意，您可以隨時透過在此處或emuiibo覆蓋層中編輯虛擬amiibo來停用此功能。
label.applicationAreasDescription=應用程式區域是每個遊戲的amiibo存檔資料。\n真實amiibo只能儲存來自一個遊戲的資料，而emuiibo的虛擬amiibo沒有此限制。\n\n如果您在上面的功能表中打開一個amiibo，您將能夠檢查該amiibo擁有的所有區域，\n以及它們對應的遊戲應用程式ID。

