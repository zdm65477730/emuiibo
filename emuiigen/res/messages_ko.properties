# About tab descriptions
label.miisDescription=각 (가상) amiibo에는 일반 amiibo처럼 mii가 연결되어 있습니다.\n\nemuiigen은 여기에서 임의의 mii를 생성할 수 없지만, mii가 없는 가상 amiibo(여기서 생성된 것들)의 경우\nemuiibo는 부팅 시 자동으로 임의의 mii를 생성합니다.\n\nemuiibo는 또한 콘솔 mii용 mii 파일(charinfo bins)을 내보내므로\n해당 mii를 amiibo 안에 복사하여 함께 사용할 수 있습니다.
label.randomUuidDescription=가상 amiibo는 고유한 무작위 UUID와 함께 생성되며, 기본적으로 emuiibo에서 사용됩니다.\n\n가상 amiibo에서 UUID 무작위화가 활성화되면 emuiibo는 이 UUID를 무시하고 무작위 UUID를 사용합니다.\n이 기능은 하루에 한 번의 보상을 제한하는 특정 게임 체크를 우회하는 데 사용할 수 있습니다.\n\n여기나 emuiibo 오버레이에서 가상 amiibo를 편집하여 언제든지 이 기능을 비활성화할 수 있습니다.
label.applicationAreasDescription=응용 프로그램 영역은 게임별 amiibo 저장 데이터입니다.\n실제 amiibo는 한 게임의 데이터만 저장할 수 있지만 emuiibo의 가상 amiibo에는 이러한 제한이 없습니다.\n\n위 메뉴에서 amiibo를 열면 해당 amiibo가 가진 모든 영역과\n해당 게임의 응용 프로그램 ID를 확인할 수 있습니다.

